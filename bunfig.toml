[install]
# Hoisted linker avoids missing tailwindcss dist chunks on Vercel (Bun isolated installs).
linker = "hoisted"
# 24h supply-chain guard: skip package versions published less than a day ago.
minimumReleaseAge = 86400
# Each entry bypasses the 24h guard for one package — confirm with the user
# before adding any.
minimumReleaseAgeExcludes = [
  "@lovable.dev/vite-tanstack-config",
  "@lovable.dev/mcp-js",
  "tailwindcss",
  "@tailwindcss/vite",
  "@tailwindcss/node",
  "@tailwindcss/oxide",
]
